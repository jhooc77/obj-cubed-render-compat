name: build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  fabric:
    name: Fabric ${{ matrix.name }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: MC-26.1-Iris-1.10.9-Sodium-0.8.9
            minecraft: '26.1'
            iris: MwcLS51S
            sodium: uGvVQBnw
            artifact: mc26.1-iris1.10.9
            minecraft_dependency: '26.1'
            iris_dependency: '1.10.9'
            sodium_dependency: '>=0.8.9 <0.9.0'
          - name: MC-26.1.1-Iris-1.10.9-Sodium-0.8.9
            minecraft: '26.1.1'
            iris: MwcLS51S
            sodium: uGvVQBnw
            artifact: mc26.1.1-iris1.10.9
            minecraft_dependency: '26.1.1'
            iris_dependency: '1.10.9'
            sodium_dependency: '>=0.8.9 <0.9.0'
          - name: MC-26.1.2-Iris-1.10.9-Sodium-0.8.12
            minecraft: '26.1.2'
            iris: MwcLS51S
            sodium: eRJU33Hp
            artifact: mc26.1.2-iris1.10.9
            minecraft_dependency: '26.1.2'
            iris_dependency: '1.10.9'
            sodium_dependency: '>=0.8.9 <0.9.0'
          - name: MC-26.1.2-Iris-1.11.2-Sodium-0.9.1
            minecraft: '26.1.2'
            iris: e4ioH5mG
            sodium: vf7UgZpC
            artifact: mc26.1.2-iris1.11.2
            minecraft_dependency: '26.1.2'
            iris_dependency: '1.11.2'
            sodium_dependency: '>=0.9.1 <0.10.0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: '25'
          cache: gradle
      - name: Build and test
        run: .\gradlew.bat clean build "-Pminecraft_version=${{ matrix.minecraft }}" "-Piris_version_id=${{ matrix.iris }}" "-Psodium_version_id=${{ matrix.sodium }}" "-Partifact_suffix=${{ matrix.artifact }}" "-Pminecraft_dependency=${{ matrix.minecraft_dependency }}" "-Piris_dependency=${{ matrix.iris_dependency }}" "-Psodium_dependency=${{ matrix.sodium_dependency }}"
      - uses: actions/upload-artifact@v4
        with:
          name: compatibility-jars-${{ matrix.name }}
          path: build/libs/obj-cubed-iris-compat-${{ matrix.artifact }}-0.2.0.jar

  optifine-patchers:
    name: OptiFine K1 ${{ matrix.target }} patcher
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target: [pre1, pre2]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: '25'
          cache: gradle
      - name: Build and test target patcher
        run: .\gradlew.bat :optifine-patcher:clean :optifine-patcher:build "-Poptifine_target=${{ matrix.target }}"
      - uses: actions/upload-artifact@v4
        with:
          name: optifine-patcher-26.1.2-k1-${{ matrix.target }}
          path: optifine-patcher/build/libs/obj-cubed-optifine-patcher-mc26.1.2-k1-${{ matrix.target }}-0.2.0.jar
