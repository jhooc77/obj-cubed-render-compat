name: build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  fabric:
    name: Fabric ${{ matrix.name }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Iris-1.10.9-Sodium-0.8.9
            minecraft: '26.1.1'
            iris: MwcLS51S
            sodium: uGvVQBnw
          - name: Iris-1.11.2-Sodium-0.9.1
            minecraft: '26.1.2'
            iris: e4ioH5mG
            sodium: vf7UgZpC
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: '25'
          cache: gradle
      - name: Build and test
        run: .\gradlew.bat clean build "-Pminecraft_version=${{ matrix.minecraft }}" "-Piris_version_id=${{ matrix.iris }}" "-Psodium_version_id=${{ matrix.sodium }}"
      - uses: actions/upload-artifact@v4
        with:
          name: compatibility-jars-${{ matrix.name }}
          path: |
            build/libs/obj-cubed-iris-compat-*.jar
            optifine-patcher/build/libs/obj-cubed-optifine-patcher-*.jar
