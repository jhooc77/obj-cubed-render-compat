name: build

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  MOD_VERSION: '0.3.1'

jobs:
  fabric-universal:
    name: Build universal Iris compatibility JAR
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: '25'
          cache: gradle
      - name: Build and test universal JAR
        run: .\gradlew.bat clean build
      - uses: actions/upload-artifact@v4
        with:
          name: iris-universal-mc26.1-26.2
          path: build/libs/obj-cubed-iris-compat-mc26.1-26.2-iris-universal-${{ env.MOD_VERSION }}.jar

  fabric-compatibility:
    name: Verify ${{ matrix.name }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: MC-26.1-Iris-1.10.9-Sodium-0.8.9
            minecraft: '26.1'
            iris: MwcLS51S
            sodium: uGvVQBnw
          - name: MC-26.1.1-Iris-1.10.9-Sodium-0.8.9
            minecraft: '26.1.1'
            iris: MwcLS51S
            sodium: uGvVQBnw
          - name: MC-26.1.2-Iris-1.10.9-Sodium-0.8.12
            minecraft: '26.1.2'
            iris: MwcLS51S
            sodium: eRJU33Hp
          - name: MC-26.1.2-Iris-1.11.2-Sodium-0.9.1
            minecraft: '26.1.2'
            iris: e4ioH5mG
            sodium: vf7UgZpC
          - name: MC-26.2-Iris-1.11.2-Sodium-0.9.1
            minecraft: '26.2'
            iris: oaD6KQls
            sodium: 2Yom1N68
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: '25'
          cache: gradle
      - name: Verify dependency API and real Sodium shader
        run: .\gradlew.bat clean check "-Pcompatibility_build=true" "-Pminecraft_version=${{ matrix.minecraft }}" "-Piris_version_id=${{ matrix.iris }}" "-Psodium_version_id=${{ matrix.sodium }}"

  optifine-patcher:
    name: Build structurally compatible OptiFine patcher
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: '25'
          cache: gradle
      - name: Build and test structural compatibility detection
        run: .\gradlew.bat :optifine-patcher:clean :optifine-patcher:build
      - uses: actions/upload-artifact@v4
        with:
          name: optifine-patcher-universal
          path: optifine-patcher/build/libs/obj-cubed-optifine-patcher-universal-${{ env.MOD_VERSION }}.jar
